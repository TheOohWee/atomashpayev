<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TheOohWee</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #fafafa;
            color: #1d1d1f;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .hero {
            text-align: center;
            padding: 2rem;
            max-width: 680px;
            animation: fadeUp 1s ease-out;
        }

        .kitten-container {
            width: 180px;
            height: 180px;
            margin: 0 auto 2.5rem;
            border-radius: 50%;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
            transition: transform 0.4s ease, box-shadow 0.4s ease;
            background: linear-gradient(135deg, #fce4ec, #f3e5f5, #e8eaf6);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .kitten-container:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.12);
        }

        .kitten-container:hover .kitten {
            animation: kittenBounce 0.6s ease infinite;
        }

        /* Pure CSS Kitten */
        .kitten {
            position: relative;
            width: 90px;
            height: 80px;
            margin-top: 10px;
            animation: kittenFloat 3s ease-in-out infinite;
        }

        /* Head */
        .kitten-head {
            position: absolute;
            width: 64px;
            height: 56px;
            background: #4a4a4a;
            border-radius: 50% 50% 45% 45%;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
        }

        /* Ears */
        .kitten-ear-left,
        .kitten-ear-right {
            position: absolute;
            width: 0;
            height: 0;
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-bottom: 20px solid #4a4a4a;
            z-index: 1;
            top: -10px;
        }

        .kitten-ear-left {
            left: 50%;
            transform: translateX(-32px) rotate(-10deg);
        }

        .kitten-ear-right {
            left: 50%;
            transform: translateX(8px) rotate(10deg);
        }

        .kitten-ear-left::after,
        .kitten-ear-right::after {
            content: '';
            position: absolute;
            width: 0;
            height: 0;
            border-left: 7px solid transparent;
            border-right: 7px solid transparent;
            border-bottom: 13px solid #ffb6c1;
            top: 5px;
            left: -7px;
        }

        /* Eyes */
        .kitten-eyes {
            position: absolute;
            top: 18px;
            left: 50%;
            transform: translateX(-50%);
            width: 44px;
            display: flex;
            justify-content: space-between;
            z-index: 3;
        }

        .kitten-eye {
            width: 14px;
            height: 14px;
            background: #1d1d1f;
            border-radius: 50%;
            position: relative;
            animation: blink 4s ease-in-out infinite;
        }

        .kitten-eye::after {
            content: '';
            position: absolute;
            width: 5px;
            height: 5px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 3px;
        }

        /* Nose */
        .kitten-nose {
            position: absolute;
            top: 32px;
            left: 50%;
            transform: translateX(-50%);
            width: 6px;
            height: 5px;
            background: #ffb6c1;
            border-radius: 50% 50% 50% 50% / 30% 30% 70% 70%;
            z-index: 3;
        }

        /* Mouth */
        .kitten-mouth {
            position: absolute;
            top: 36px;
            left: 50%;
            transform: translateX(-50%);
            width: 16px;
            height: 6px;
            z-index: 3;
        }

        .kitten-mouth::before,
        .kitten-mouth::after {
            content: '';
            position: absolute;
            width: 9px;
            height: 6px;
            border-bottom: 2px solid #3a3a3a;
            border-radius: 0 0 50% 50%;
        }

        .kitten-mouth::before { left: 0; }
        .kitten-mouth::after { right: 0; }

        /* Whiskers */
        .kitten-whiskers {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 20px;
            z-index: 3;
        }

        .kitten-whiskers::before,
        .kitten-whiskers::after {
            content: '';
            position: absolute;
            width: 22px;
            height: 1px;
            background: #888;
            top: 6px;
        }

        .kitten-whiskers::before { left: 0; transform: rotate(-5deg); }
        .kitten-whiskers::after { right: 0; transform: rotate(5deg); }

        /* Body */
        .kitten-body {
            position: absolute;
            width: 54px;
            height: 36px;
            background: #4a4a4a;
            border-radius: 50% 50% 40% 40%;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1;
        }

        /* Tail */
        .kitten-tail {
            position: absolute;
            width: 30px;
            height: 14px;
            border: 3px solid #4a4a4a;
            border-color: #4a4a4a transparent transparent transparent;
            border-radius: 50% 50% 0 0;
            bottom: 8px;
            right: 2px;
            z-index: 0;
            transform-origin: left center;
            animation: tailWag 1.5s ease-in-out infinite;
        }

        @keyframes kittenFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        @keyframes kittenBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes blink {
            0%, 42%, 46%, 100% { transform: scaleY(1); }
            44% { transform: scaleY(0.1); }
        }

        @keyframes tailWag {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(15deg); }
            75% { transform: rotate(-10deg); }
        }

        .greeting {
            font-size: 0.875rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #86868b;
            margin-bottom: 0.75rem;
        }

        h1 {
            font-size: clamp(2.5rem, 5vw, 3.5rem);
            font-weight: 600;
            letter-spacing: -0.025em;
            line-height: 1.1;
            margin-bottom: 1.25rem;
            background: linear-gradient(135deg, #1d1d1f 0%, #6e6e73 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .tagline {
            font-size: 1.25rem;
            font-weight: 300;
            color: #6e6e73;
            line-height: 1.5;
            margin-bottom: 2.5rem;
        }

        .links {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .links a {
            color: #0071e3;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 400;
            transition: color 0.3s ease;
            position: relative;
        }

        .links a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 1px;
            background: #0071e3;
            transition: width 0.3s ease;
        }

        .links a:hover {
            color: #0077ed;
        }

        .links a:hover::after {
            width: 100%;
        }

        .links a span {
            font-size: 0.75rem;
            margin-left: 0.15rem;
            transition: transform 0.3s ease;
            display: inline-block;
        }

        .links a:hover span {
            transform: translateX(3px);
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 480px) {
            .kitten-container {
                width: 140px;
                height: 140px;
                margin-bottom: 2rem;
            }

            .tagline {
                font-size: 1.1rem;
            }

            .links {
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
    <main class="hero">
        <div class="kitten-container">
            <div class="kitten">
                <div class="kitten-ear-left"></div>
                <div class="kitten-ear-right"></div>
                <div class="kitten-head">
                    <div class="kitten-eyes">
                        <div class="kitten-eye"></div>
                        <div class="kitten-eye"></div>
                    </div>
                    <div class="kitten-nose"></div>
                    <div class="kitten-mouth"></div>
                    <div class="kitten-whiskers"></div>
                </div>
                <div class="kitten-body"></div>
                <div class="kitten-tail"></div>
            </div>
        </div>
        <p class="greeting">Hello, world</p>
        <h1>TheOohWee.</h1>
        <p class="tagline">Developer. Creator. Cat enthusiast.</p>
        <nav class="links">
            <a href="https://github.com/theoohwee">GitHub <span>&rsaquo;</span></a>
            <a href="#">Projects <span>&rsaquo;</span></a>
            <a href="#">Contact <span>&rsaquo;</span></a>
        </nav>
    </main>
</body>
</html>
