<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TheOohWee</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #fafafa;
            color: #1d1d1f;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .hero {
            text-align: center;
            padding: 2rem;
            max-width: 680px;
            animation: fadeUp 1s ease-out;
        }

        .kitten-container {
            width: 180px;
            height: 180px;
            margin: 0 auto 2.5rem;
            border-radius: 50%;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
            transition: transform 0.4s ease, box-shadow 0.4s ease;
            background: linear-gradient(135deg, #fce4ec, #f3e5f5, #e8eaf6);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: kittenFloat 3s ease-in-out infinite;
        }

        .kitten-container:hover {
            transform: scale(1.08);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.12);
            animation: none;
        }

        .kitten-container svg {
            width: 120px;
            height: 120px;
            margin-top: 8px;
        }

        @keyframes kittenFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        @keyframes blink {
            0%, 42%, 46%, 100% { transform: scaleY(1); }
            44% { transform: scaleY(0.1); }
        }

        @keyframes tailWag {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(20deg); }
            75% { transform: rotate(-15deg); }
        }

        .greeting {
            font-size: 0.875rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #86868b;
            margin-bottom: 0.75rem;
        }

        h1 {
            font-size: clamp(2.5rem, 5vw, 3.5rem);
            font-weight: 600;
            letter-spacing: -0.025em;
            line-height: 1.1;
            margin-bottom: 1.25rem;
            background: linear-gradient(135deg, #1d1d1f 0%, #6e6e73 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .tagline {
            font-size: 1.25rem;
            font-weight: 300;
            color: #6e6e73;
            line-height: 1.5;
            margin-bottom: 2.5rem;
        }

        .links {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .links a {
            color: #0071e3;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 400;
            transition: color 0.3s ease;
            position: relative;
        }

        .links a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 1px;
            background: #0071e3;
            transition: width 0.3s ease;
        }

        .links a:hover {
            color: #0077ed;
        }

        .links a:hover::after {
            width: 100%;
        }

        .links a span {
            font-size: 0.75rem;
            margin-left: 0.15rem;
            transition: transform 0.3s ease;
            display: inline-block;
        }

        .links a:hover span {
            transform: translateX(3px);
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 480px) {
            .kitten-container {
                width: 140px;
                height: 140px;
                margin-bottom: 2rem;
            }

            .tagline {
                font-size: 1.1rem;
            }

            .links {
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
    <main class="hero">
        <div class="kitten-container">
            <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
                <!-- Tail -->
                <path d="M85 88 Q105 75 100 60 Q97 52 90 55" fill="none" stroke="#6b6b6b" stroke-width="4" stroke-linecap="round" style="transform-origin: 85px 88px; animation: tailWag 1.5s ease-in-out infinite;"/>

                <!-- Body -->
                <ellipse cx="60" cy="90" rx="28" ry="20" fill="#7a7a7a"/>

                <!-- Left paw -->
                <ellipse cx="42" cy="105" rx="8" ry="5" fill="#6b6b6b"/>
                <!-- Right paw -->
                <ellipse cx="78" cy="105" rx="8" ry="5" fill="#6b6b6b"/>

                <!-- Head -->
                <ellipse cx="60" cy="52" rx="30" ry="27" fill="#8a8a8a"/>

                <!-- Left ear -->
                <polygon points="35,35 28,10 48,28" fill="#8a8a8a"/>
                <polygon points="37,32 32,16 46,30" fill="#ffb6c1"/>

                <!-- Right ear -->
                <polygon points="85,35 92,10 72,28" fill="#8a8a8a"/>
                <polygon points="83,32 88,16 74,30" fill="#ffb6c1"/>

                <!-- Eyes -->
                <g style="transform-origin: 60px 48px; animation: blink 4s ease-in-out infinite;">
                    <!-- Left eye -->
                    <ellipse cx="48" cy="48" rx="7" ry="7.5" fill="#2d2d2d"/>
                    <ellipse cx="46" cy="46" rx="2.5" ry="2.5" fill="white"/>
                    <!-- Right eye -->
                    <ellipse cx="72" cy="48" rx="7" ry="7.5" fill="#2d2d2d"/>
                    <ellipse cx="70" cy="46" rx="2.5" ry="2.5" fill="white"/>
                </g>

                <!-- Nose -->
                <ellipse cx="60" cy="58" rx="3.5" ry="2.5" fill="#ffb6c1"/>

                <!-- Mouth -->
                <path d="M56 61 Q60 65 60 61" fill="none" stroke="#5a5a5a" stroke-width="1.2" stroke-linecap="round"/>
                <path d="M64 61 Q60 65 60 61" fill="none" stroke="#5a5a5a" stroke-width="1.2" stroke-linecap="round"/>

                <!-- Whiskers -->
                <line x1="15" y1="53" x2="40" y2="56" stroke="#aaa" stroke-width="1" stroke-linecap="round"/>
                <line x1="17" y1="60" x2="40" y2="60" stroke="#aaa" stroke-width="1" stroke-linecap="round"/>
                <line x1="15" y1="67" x2="40" y2="64" stroke="#aaa" stroke-width="1" stroke-linecap="round"/>
                <line x1="80" y1="56" x2="105" y2="53" stroke="#aaa" stroke-width="1" stroke-linecap="round"/>
                <line x1="80" y1="60" x2="103" y2="60" stroke="#aaa" stroke-width="1" stroke-linecap="round"/>
                <line x1="80" y1="64" x2="105" y2="67" stroke="#aaa" stroke-width="1" stroke-linecap="round"/>

                <!-- Chest patch -->
                <ellipse cx="60" cy="85" rx="12" ry="10" fill="#9a9a9a"/>
            </svg>
        </div>
        <p class="greeting">Hello, world</p>
        <h1>TheOohWee.</h1>
        <p class="tagline">Developer. Creator. Cat enthusiast.</p>
        <nav class="links">
            <a href="https://github.com/theoohwee">GitHub <span>&rsaquo;</span></a>
            <a href="#">Projects <span>&rsaquo;</span></a>
            <a href="#">Contact <span>&rsaquo;</span></a>
        </nav>
    </main>
</body>
</html>
